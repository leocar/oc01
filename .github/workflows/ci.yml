name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**
  workflow_dispatch:

jobs:
  ci:
    name: Test, typecheck, lint, format, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build web app
        run: pnpm --filter @oc01/web build

  sql-smoke:
    name: SQL Server RLS smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Run SQL Server RLS smoke
        run: pnpm smoke:sqlserver
